<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Package Design — Carol</title>
  <link rel="icon" type="image/png" href="favicon.png">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,300;12..96,400;12..96,500;12..96,800&family=Jersey+10&display=swap" rel="stylesheet">
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #111111;
      --white: #F1F1F1;
      --off: #F1F1F1; 
      --gray: #aaaaaa;
      --border: #e5e1db;
      --dot: #d6d2cc;
      --accent: #F14F9B; 
    }

    body.dark-mode {
      --black: #ffffff;
      --white: #111111;
      --off: #111111;
      --gray: #888888;
      --border: #333333;
      --dot: #333333;
    }

    html, body {
      width: 100%; height: 100%;
      font-family: 'Bricolage Grotesque', sans-serif;
      background: var(--white);
      color: var(--black);
      cursor: none;
      transition: background-color 0.5s ease, color 0.5s ease;
      overflow-x: hidden;
    }

    /* ── cursor ── */
    #cursor {
      position: fixed; width: 9px; height: 9px;
      background: #fff; border-radius: 50%;
      pointer-events: none; z-index: 9999;
      transform: translate(-50%,-50%);
      transition: width .2s, height .2s, opacity .2s;
      mix-blend-mode: difference;
    }
    #cursor.big { width: 44px; height: 44px; opacity: 1; }

/* ── NAV ── */
    #nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      padding: 30px 10vw;
      display: flex; justify-content: space-between; align-items: center;
      z-index: 200;
      background: transparent;
      pointer-events: none; /* 👈 核心修复：让这层隐形的背景允许鼠标直接穿透下去 */
    }
    .nav-logo { 
      pointer-events: auto; /* 👈 保证 Logo 依然可以点击 */
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: 32px; 
      font-weight: 800; 
      letter-spacing: -0.02em; 
      color: var(--accent); 
      text-decoration: none; 
      display: flex; align-items: center; gap: 10px; 
      margin-left: -36px;
    }
    .nav-logo svg { width: 26px; height: 26px; }
    
    .nav-links { display: flex; gap: 32px; align-items: center; }
    .nav-links > a, .nav-item-dropdown > a {
      font-size: 12px; font-weight: 500; letter-spacing: .12em; text-transform: uppercase;
      color: var(--black); text-decoration: none; position: relative; padding-bottom: 2px;
    }
    .nav-links > a::after, .nav-item-dropdown > a::after {
      content: ''; position: absolute; bottom: 0; left: 0;
      width: 0; height: 1px; background: var(--black); transition: width .3s;
    }
    .nav-links > a:hover::after, .nav-item-dropdown:hover > a::after { width: 100%; }
    .nav-links { display: flex; gap: 32px; align-items: center; pointer-events: auto; /* 👈 保证菜单按钮依然可以点击 */ }

    .nav-item-dropdown { position: relative; display: flex; align-items: center; padding: 12px 0; margin: -12px 0; }
    .dropdown-menu {
      position: absolute; top: 100%; right: -10px; margin-top: 0;
      background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(12px);
      border: 1px solid var(--border); border-radius: 14px; padding: 10px;
      display: flex; flex-direction: column; gap: 4px; min-width: 140px;
      box-shadow: 0 12px 32px rgba(0,0,0,0.06); opacity: 0; transform: translateY(-5px); pointer-events: none;
      transition: opacity 0.25s ease, transform 0.25s ease, background 0.5s ease;
      z-index: 100;
    }
    .nav-item-dropdown:hover .dropdown-menu { opacity: 1; transform: translateY(0); pointer-events: auto; }
    body.dark-mode .dropdown-menu { background: rgba(17, 17, 17, 0.95); }
    body.dark-mode .dropdown-menu img { filter: invert(1); }
    .dropdown-menu a {
      display: flex !important; align-items: center; gap: 12px; padding: 10px 14px; color: var(--black) !important;
      text-decoration: none !important; font-size: 13px !important; font-weight: 500 !important;
      text-transform: capitalize !important; border-radius: 8px; transition: background 0.2s !important;
    }
    .dropdown-menu a::after { display: none !important; } 
    .dropdown-menu a:hover { background: var(--off); }
    .dropdown-menu img { width: 16px; height: 16px; object-fit: contain; }

    .theme-toggle {
      background: transparent; border: 1px solid var(--border); width: 44px; height: 44px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center; text-decoration: none; border: none;
      cursor: none; margin-left: 12px; padding: 0; transition: transform .2s, background-color .3s, border-color .3s; outline: none;
    }
    .theme-toggle img { width: 20px; height: 20px; object-fit: contain; filter: brightness(0); transition: filter .3s; }
    .theme-toggle:hover { transform: scale(0.92); background-color: var(--black); border-color: var(--black); }
    .theme-toggle:hover img { filter: brightness(0) invert(1); }
    body.dark-mode .theme-toggle { border-color: rgba(255, 255, 255, 0.3); }
    body.dark-mode .theme-toggle img { filter: brightness(0) invert(1); }
    body.dark-mode .theme-toggle:hover { background-color: var(--white); border-color: var(--white); }
    body.dark-mode .theme-toggle:hover img { filter: brightness(0); }

    /* ══════════════════════════════
       APP STAGE (INTERACTIVE VIEWER)
    ══════════════════════════════ */
    #interactive-app {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      overflow: hidden;
      background: var(--off);
      transition: background 0.5s ease;
    }

    #interactive-app::before {
      content: '';
      position: absolute; inset: 0;
      background-image: radial-gradient(circle, var(--dot) 1px, transparent 1px);
      background-size: 38px 38px;
      opacity: 0.5;
      pointer-events: none;
      transition: background-image 0.5s ease;
    }

    /* ── LEFT: 初始文字介绍 ── */
    #intro-text {
      width: 50%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding-left: 10vw;
      padding-right: 4vw;
      z-index: 5;
      overflow: hidden;
      transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.5s ease;
    }
    
    .intro-text-inner { width: 40vw; min-width: 300px; }

    .intro-eyebrow {
      font-size: 11px; font-weight: 700; letter-spacing: .2em;
      text-transform: uppercase; color: var(--gray); margin-bottom: 20px;
    }
    .intro-title {
      font-family: 'Jersey 10', sans-serif;
      font-size: clamp(60px, 8vw, 110px); 
      font-weight: 400; line-height: 0.9; letter-spacing: 0.02em;
      color: var(--accent); margin-bottom: 24px;
    }
    .intro-desc {
      font-size: 18px; line-height: 1.6; font-weight: 500;
      color: var(--black); max-width: 420px;
      transition: color 0.5s ease;
    }
    .intro-subdesc { font-size: 14px; color: var(--gray); margin-top: 8px; }

    /* 当详情打开时，文字区域完全消失 */
    .detail-open #intro-text { width: 0%; opacity: 0; padding: 0; }

    /* ── MIDDLE: 3D 卡片舞台 ── */
    #card-stage {
      width: 50%; /* 初始占据右半屏 */
      height: 100%;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 2;
    }

    /* 🌟 修改：详情打开时，左侧占 35%，给右侧大图留出更多空间 */
    .detail-open #card-stage { width: 35%; }

    /* 3D 容器 */
    #card-swap {
      position: relative;
      top: 26vh;      
      width: 760px;   
      height: 640px;  
      transform-style: preserve-3d;
      perspective: 1400px; 
      transform: scale(1);
      transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1), top 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    /* 🌟 修改：打开详情时，卡片更小并且往上移，给下面的文字留位置 */
    .detail-open #card-swap { 
      transform: scale(0.45); 
      top: -8vh; 
    }

    /* 🌟 NEW: 左侧详情文字 (初始隐藏) */
    #left-info {
      position: absolute;
      bottom: 15vh; /* 放在卡片下方 */
      left: 4vw;
      right: 2vw;
      opacity: 0;
      pointer-events: none;
      transform: translateY(20px);
      transition: opacity 0.4s ease, transform 0.4s ease;
      display: flex;
      flex-direction: column;
    }
    .detail-open #left-info {
      opacity: 1;
      transform: translateY(0);
      transition-delay: 0.5s; /* 等卡片缩小了再浮现 */
    }

    .panel-num { font-size: 11px; font-weight: 700; letter-spacing: .16em; text-transform: uppercase; color: var(--gray); margin-bottom: 8px; }
    .panel-title { font-size: 32px; font-weight: 800; letter-spacing: -.02em; line-height: 1.1; margin-bottom: 12px; color: var(--black); transition: color 0.5s; }
    body.dark-mode .panel-title { color: var(--white); }
    .panel-desc { font-size: 15px; line-height: 1.6; color: var(--gray); max-width: 90%; }

    /* Browser Window Card Style */
    .pkg-card {
      position: absolute;
      top: 50%; left: 50%;
      width: 760px; height: 640px; 
      border-radius: 16px; 
      overflow: hidden;
      background: var(--white);
      border: 1px solid var(--border);
      box-shadow: 0 24px 80px rgba(0,0,0,.15);
      cursor: none;
      will-change: transform;
      backface-visibility: hidden;
      display: flex; flex-direction: column;
      transition: box-shadow .3s, border-color 0.5s;
    }

    body.dark-mode .pkg-card { box-shadow: 0 24px 80px rgba(0,0,0,.6); border-color: rgba(255,255,255,0.1); }
    .pkg-card:hover { box-shadow: 0 36px 100px rgba(0,0,0,.3); }

    /* 窗口顶部栏 */
    .pkg-top-bar {
      height: 40px; padding: 0 16px;
      display: flex; align-items: center; gap: 12px;
      background: var(--white); border-bottom: 1px solid var(--border);
      flex-shrink: 0; transition: background-color 0.5s, border-color 0.5s;
    }
    body.dark-mode .pkg-top-bar { background: #1a1a1a; border-color: rgba(255,255,255,0.05); }

    .pkg-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--black); opacity: 0.15; transition: background-color 0.5s; }
    body.dark-mode .pkg-dot { background: var(--white); opacity: 0.3; }

    .pkg-title { font-size: 13px; font-weight: 600; letter-spacing: 0.05em; color: var(--black); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; transition: color 0.5s; }
    body.dark-mode .pkg-title { color: var(--white); }

    .pkg-content { flex: 1; position: relative; overflow: hidden; }
    .pkg-content img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform .5s ease; user-select: none; -webkit-user-drag: none; }
    .pkg-card:hover .pkg-content img { transform: scale(1.06); }

    .pkg-card-cta {
      position: absolute; bottom: 24px; right: 24px;
      display: flex; align-items: center; gap: 7px;
      font-size: 11px; font-weight: 700; letter-spacing: .1em;
      text-transform: uppercase; color: var(--black);
      background: rgba(255,255,255,0.8);
      padding: 6px 6px 6px 14px; border-radius: 40px;
      backdrop-filter: blur(4px);
      opacity: 0; transition: opacity .3s, transform 0.3s;
      transform: translateY(10px);
    }
    .pkg-card-cta .arrow-circle { width: 28px; height: 28px; border-radius: 50%; background: var(--black); color: var(--white); display: flex; align-items: center; justify-content: center; font-size: 14px; }
    .pkg-card:hover .pkg-card-cta { opacity: 1; transform: translateY(0); }


    /* ── RIGHT: detail panel ── */
    #detail-panel {
      width: 0%; 
      height: 100%;
      position: relative;
      display: flex;
      flex-direction: column;
      background: var(--white);
      border-left: 1px solid transparent;
      opacity: 0;
      pointer-events: none;
      transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.6s ease, background-color 0.5s;
      z-index: 10;
    }
    /* 🌟 修改：右侧完全放给图片画廊，占 65% */
    .detail-open #detail-panel {
      width: 65%; opacity: 1; pointer-events: all; border-left-color: var(--border);
    }

    /* 🌟 修改：关闭按钮悬浮在图片上 */
    #close-btn {
      position: absolute;
      top: 30px; right: 30px;
      z-index: 100;
      width: 48px; height: 48px; border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.3); background: rgba(0,0,0,0.3); color: #fff;
      display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: none;
      transition: background .2s, border-color 0.2s, transform 0.2s;
      backdrop-filter: blur(8px);
    }
    #close-btn:hover { background: var(--accent); border-color: var(--accent); transform: scale(1.1); }

    /* image gallery */
    #gallery-wrap {
      flex: 1; position: relative; overflow: hidden; background: #111111; 
    }
    #gallery-track {
      display: flex; height: 100%; will-change: transform; transition: transform .5s cubic-bezier(.4,0,.2,1);
    }
    .g-slide {
      flex-shrink: 0; width: 100%; height: 100%; position: relative; display: flex; align-items: center; justify-content: center;
    }
    .g-slide img {
      width: 100%; height: 100%; object-fit: cover; display: block; user-select: none; -webkit-user-drag: none;
    }

    /* gallery nav */
    .g-nav-btn {
      position: absolute; top: 50%; z-index: 10;
      transform: translateY(-50%);
      width: 48px; height: 48px; border-radius: 50%;
      background: var(--accent); border: 1px solid transparent; color: #fff; 
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; cursor: none; transition: background .2s, transform 0.2s, color 0.2s;
    }
    .g-nav-btn:hover { background: #000; color: #fff; transform: translateY(-50%) scale(1.1); }
    #g-prev { left: 16px; }
    #g-next { right: 16px; }

    /* dots */
    #g-dots {
      position: absolute; bottom: 30px; left: 0; right: 0; display: flex; justify-content: center; gap: 8px; z-index: 10;
    }
    .g-dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,.4); cursor: none; transition: background .2s, transform .2s; }
    .g-dot.on { background: var(--accent); transform: scale(1.4); }

    /* 手机端适配 */
    @media (max-width: 768px) {
      #cursor { display: none !important; }
      body, a, button, .pkg-card, .theme-toggle, .ft-icon-btn, .dropdown-menu { cursor: auto !important; }
      #nav { padding: 20px 6vw !important; }
      .nav-logo { font-size: 28px !important; gap: 6px !important; margin-left: -20px !important; }
      .nav-logo svg { width: 20px !important; height: 20px !important; }
      .theme-toggle:hover { background-color: transparent !important; border-color: var(--border) !important; }
      .theme-toggle:hover img { filter: brightness(0) !important; }

      #interactive-app { flex-direction: column; height: auto; min-height: 100vh; padding-top: 80px; }
      
      #intro-text { width: 100%; height: 35vh; padding: 40px 6vw 0; justify-content: center; text-align: center; }
      .intro-text-inner { width: 100%; }
      .intro-desc { margin: 0 auto; }
      
      #card-stage { height: 50vh; width: 100%; transition: none; }
      #detail-panel { width: 100% !important; height: 0; opacity: 0; transition: opacity 0.5s; border-left: none; }
      
      .detail-open #intro-text { height: 0; padding: 0; opacity: 0; }
      .detail-open #card-stage { height: 45vh; width: 100%; }
      .detail-open #detail-panel { height: 55vh; opacity: 1; }
      
      /* 手机端的初始缩放和打开详情后的缩放 */
      #card-swap { transform: scale(0.5); top: 12vh; }
      .detail-open #card-swap { transform: scale(0.35); top: -8vh; }
      
      /* 手机端文字排版 */
      #left-info { bottom: 2vh; text-align: center; left: 6vw; right: 6vw; }
      .panel-title { font-size: 24px; margin-bottom: 8px; }
      .panel-desc { font-size: 13px; max-width: 100%; }
    }
  </style>
</head>
<body>

<div id="cursor"></div>

<nav id="nav">
  <a href="index.html" class="nav-logo">
    <svg viewBox="0 0 10 10" shape-rendering="crispEdges">
      <path fill="var(--accent)" d="M2,2h2v1h-2z M6,2h2v1h-2z M1,3h8v2h-8z M2,5h6v1h-6z M3,6h4v1h-4z M4,7h2v1h-2z" />
    </svg>
    Carol.
  </a>
  
  <div class="nav-links">
    <a href="index.html#projects">Work</a>
    <a href="about.html">About</a>
    
    <div class="nav-item-dropdown">
      <a href="#">Contact</a>
      <div class="dropdown-menu">
        <a href="https://www.linkedin.com/in/carol-chen-6a4a75329/" target="_blank">
          <img src="icon-linkedin.png" alt="LinkedIn"> LinkedIn
        </a>
        <a href="https://www.instagram.com/yougedashuaige?igsh=MW1qc3p1NmJnODJueA%3D%3D&utm_source=qr" target="_blank">
          <img src="icon-instagram.png" alt="Instagram"> Instagram
        </a>
        <a href="mailto:YauchiTATA@Gmail.com">
          <img src="icon-mail.png" alt="Email"> Email
        </a>
      </div>
    </div>
    
    <button id="theme-toggle" class="theme-toggle" tabindex="0" aria-label="Toggle theme">
      <img id="theme-icon" src="image_df6b67.png" alt="Theme icon">
    </button>
  </div>
</nav>

<section id="interactive-app">

  <div id="intro-text">
    <div class="intro-text-inner">
      <div class="intro-eyebrow">Interactive Showcase</div>
      <h1 class="intro-title">Package<br>Design.</h1>
      <p class="intro-desc">Packaging that tells a story.</p>
      <p class="intro-subdesc">Click on any project card to explore the details.</p>
    </div>
  </div>

  <div id="card-stage">
    <div id="card-swap"></div>
    
    <div id="left-info">
      <div class="panel-num" id="p-num"></div>
      <div class="panel-title" id="p-title"></div>
      <div class="panel-desc" id="p-desc"></div>
    </div>
  </div>

  <div id="detail-panel">
    <button id="close-btn" onclick="closeDetail()" title="Back">✕</button>

    <div id="gallery-wrap">
      <div id="gallery-track"></div>
      <button class="g-nav-btn" id="g-prev" onclick="gMove(-1)">←</button>
      <button class="g-nav-btn" id="g-next" onclick="gMove(1)">→</button>
      <div id="g-dots"></div>
    </div>
  </div>

</section>

<script>
  /* ── Theme Toggle & Cursor ── */
  const themeBtn = document.getElementById('theme-toggle');
  const themeIcon = document.getElementById('theme-icon');
  const sunIconPath = "image_df6b4a.png"; 
  const moonIconPath = "image_df6b67.png"; 

  if (localStorage.getItem('theme') === 'dark') {
    document.body.classList.add('dark-mode'); themeIcon.src = sunIconPath; 
  } else { themeIcon.src = moonIconPath; }

  themeBtn.addEventListener('click', () => {
    document.body.classList.toggle('dark-mode');
    if (document.body.classList.contains('dark-mode')) {
      themeIcon.src = sunIconPath; localStorage.setItem('theme', 'dark'); 
    } else {
      themeIcon.src = moonIconPath; localStorage.setItem('theme', 'light'); 
    }
  });

  const cur = document.getElementById('cursor');
  document.addEventListener('mousemove', e => {
    cur.style.left = e.clientX + 'px'; cur.style.top = e.clientY + 'px';
  });
  document.querySelectorAll('a, button, .pkg-card, .g-dot, .g-nav-btn, .theme-toggle, .ft-icon-btn, #close-btn').forEach(el => {
    el.addEventListener('mouseenter', () => cur.classList.add('big'));
    el.addEventListener('mouseleave', () => cur.classList.remove('big'));
  });

 /* ──────────────────────────
     PROJECT DATA
  ──────────────────────────── */
  const PROJECTS = [
    {
      num: '01', name: 'Mid-Autumn Mooncake', tag: 'Package Design',
      bg: '#c5c0d8', // 如果封面的背景色需要换，可以改这里的色号
      cover: 'pkg1-cover.jpg', // 👈 这里换成了你的本地图片
      desc: 'Balancing modern aesthetics with traditional Chinese elements to appeal to younger audiences while preserving cultural significance.',
      images: [
        { src: 'pkg1-img1.jpg' }, // 👈 这里换成了你的本地图片
        { src: 'pkg1-img2.jpg' },
        { src: 'pkg1-img3.jpg' },
        { src: 'pkg1-img4.jpg' },
      ],
    },
    {
      num: '02', name: '21 Golden Vita', tag: 'Package Design',
      bg: '#e8e0cc',
      cover: 'pkg2-cover.jpg', // 👈 换成本地图片
      desc: 'Conveying professionalism and trustworthiness in a competitive health and nutrition market.',
      images: [
        { src: 'pkg2-img1.jpg' },
        { src: 'pkg2-img2.jpg' },
        { src: 'pkg2-img3.jpg' },
      ],
    },
    {
      num: '03', name: 'Zhongtang Brown Sugar', tag: 'Package Design',
      bg: '#3a2010',
      cover: 'pkg3-cover.jpg', // 👈 换成本地图片
      desc: 'Maintaining the authenticity of a traditional product while appealing to modern consumers.',
      images: [
        { src: 'pkg3-img1.jpg' },
        { src: 'pkg3-img2.jpg' },
        { src: 'pkg3-img3.jpg' },
      ],
    },
  ];

  /* ──────────────────────────
     CardSwap setup
  ──────────────────────────── */
  const DIST_X = 85, DIST_Y = 90, SKEW = 4, SWAP_DELAY = 3800; 
  const container = document.getElementById('card-swap');
  const cardEls = [];
  const order = PROJECTS.map((_, i) => i); 

  const makeSlot = (i, total) => ({ x: i * DIST_X, y: -i * DIST_Y, z: -i * DIST_X * 1.8, zIndex: total - i });

  /* 构建新的浏览器窗口式卡片 DOM */
  PROJECTS.forEach((p, i) => {
    const el = document.createElement('div');
    el.className = 'pkg-card';
    el.innerHTML = `
      <div class="pkg-top-bar">
        <div class="pkg-dot"></div>
        <div class="pkg-title">${p.name.replace('\n', ' ')}</div>
      </div>
      <div class="pkg-content" style="background:${p.bg}">
        <img src="${p.cover}" alt="${p.name}" draggable="false">
        <div class="pkg-card-cta">Open <div class="arrow-circle">→</div></div>
      </div>
    `;
    el.addEventListener('click', () => openDetail(order[0]));
    container.appendChild(el);
    cardEls.push(el);
  });

  function placeNow(el, slot) {
    gsap.set(el, { x: slot.x, y: slot.y, z: slot.z, xPercent: -50, yPercent: -50, skewY: SKEW, transformOrigin: 'center center', zIndex: slot.zIndex, force3D: true });
  }
  PROJECTS.forEach((_, i) => placeNow(cardEls[i], makeSlot(i, PROJECTS.length)));

  /* 自动轮播动画 */
  let swapInterval;
  let tlActive = null;

  function swap() {
    if (order.length < 2 || document.getElementById('interactive-app').classList.contains('detail-open')) return;
    
    const oldFrontIdx = order[0];
    const elOldFront = cardEls[oldFrontIdx];
    
    order.push(order.shift()); 

    const tl = gsap.timeline();
    tlActive = tl;

    tl.to(elOldFront, { y: '+=900', duration: 1.8, ease: 'elastic.out(0.55,0.85)' });
    
    const promoteAt = `-=${1.8 * 0.88}`;
    tl.addLabel('promote', promoteAt);
    
    for (let i = 0; i < order.length - 1; i++) {
      const currentCardIdx = order[i];
      const slot = makeSlot(i, PROJECTS.length);
      tl.set(cardEls[currentCardIdx], { zIndex: slot.zIndex }, 'promote');
      tl.to(cardEls[currentCardIdx], { 
        x: slot.x, y: slot.y, z: slot.z, 
        duration: 1.8, ease: 'elastic.out(0.55,0.85)' 
      }, `promote+=${i * 0.13}`);
    }

    const backSlot = makeSlot(PROJECTS.length - 1, PROJECTS.length);
    tl.addLabel('return', `promote+=${1.8 * 0.18}`);
    tl.call(() => gsap.set(elOldFront, { zIndex: backSlot.zIndex }), undefined, 'return');
    tl.to(elOldFront, { 
      x: backSlot.x, y: backSlot.y, z: backSlot.z, 
      duration: 1.8, ease: 'elastic.out(0.55,0.85)' 
    }, 'return');
  }

  function startSwap() { swap(); swapInterval = setInterval(swap, SWAP_DELAY); }
  startSwap();

  /* ──────────────────────────
     DETAIL PANEL LOGIC
  ──────────────────────────── */
  let gIndex = 0;
  let dragStartX = 0, dragDeltaX = 0;
  const appSection = document.getElementById('interactive-app');

  function openDetail(idx) {
    if (appSection.classList.contains('detail-open')) return;
    
    clearInterval(swapInterval);
    tlActive?.kill();

    const p = PROJECTS[idx];

    /* 填充左侧下方信息 */
    document.getElementById('p-num').textContent = `${p.num} — ${p.tag}`;
    document.getElementById('p-title').innerHTML = p.name.replace('\n', '<br>');
    document.getElementById('p-desc').textContent = p.desc;

    /* 构建纯净版大图画廊 */
    gIndex = 0;
    const track = document.getElementById('gallery-track');
    track.innerHTML = p.images.map((img, i) => `
      <div class="g-slide" style="background:${p.bg}">
        <img src="${img.src}" alt="slide ${i+1}" draggable="false">
      </div>
    `).join('');
    track.style.transition = 'none';
    track.style.transform = 'translateX(0)';

    const dots = document.getElementById('g-dots');
    dots.innerHTML = p.images.map((_, i) => `<div class="g-dot${i===0?' on':''}" onclick="gGoTo(${i})"></div>`).join('');

    /* 触发分屏魔法动画 */
    appSection.classList.add('detail-open');

    /* 核心修复：打开详情时，将第一张卡片回正并完美居中，隐藏背后的卡片 */
    const frontIdx = order[0];
    gsap.to(cardEls[frontIdx], { 
      x: 0, y: 0, z: 0, skewY: 0, 
      scale: 1, opacity: 1, 
      duration: 0.6, ease: 'power2.out' 
    });
    
    // 背后的卡片完全透明隐藏
    order.slice(1).forEach(i => {
      gsap.to(cardEls[i], { opacity: 0, duration: 0.4, ease: 'power2.out' });
    });

    setupSwipe();
  }

  function closeDetail() {
    if (!appSection.classList.contains('detail-open')) return;
    
    appSection.classList.remove('detail-open');

    /* 恢复卡片 3D 错位原位 */
    PROJECTS.forEach((_, i) => {
      const slot = makeSlot(order.indexOf(i), PROJECTS.length);
      gsap.to(cardEls[i], { 
        x: slot.x, y: slot.y, z: slot.z, 
        skewY: SKEW, 
        opacity: 1, scale: 1, 
        duration: 0.7, ease: 'power2.out' 
      });
    });

    setTimeout(() => { startSwap(); }, 800);
  }

  /* ──────────────────────────
     GALLERY NAV & SWIPE
  ──────────────────────────── */
  function gMove(dir) {
    const total = document.querySelectorAll('.g-slide').length;
    if (total <= 0) return; 
    gIndex = Math.max(0, Math.min(total - 1, gIndex + dir));
    gRender();
  }
  function gGoTo(i) { gIndex = i; gRender(); }
  function gRender() {
    const track = document.getElementById('gallery-track');
    track.style.transition = 'transform .5s cubic-bezier(.4,0,.2,1)';
    track.style.transform = `translateX(-${gIndex * 100}%)`;
    document.querySelectorAll('.g-dot').forEach((d, i) => d.classList.toggle('on', i === gIndex));
  }

  function setupSwipe() {
    const wrap = document.getElementById('gallery-wrap');
    
    wrap.onmousedown = null; wrap.onmousemove = null; wrap.onmouseup = null;
    wrap.onmouseleave = null; wrap.ontouchstart = null; wrap.ontouchmove = null; wrap.ontouchend = null;

    wrap.onmousedown = e => { dragStartX = e.clientX; dragDeltaX = 0; };
    wrap.onmousemove = e => { if (e.buttons === 1) dragDeltaX = e.clientX - dragStartX; };
    wrap.onmouseup = () => { if (Math.abs(dragDeltaX) > 48) gMove(dragDeltaX < 0 ? 1 : -1); dragDeltaX = 0; };
    wrap.onmouseleave = () => { if (Math.abs(dragDeltaX) > 48) gMove(dragDeltaX < 0 ? 1 : -1); dragDeltaX = 0; };
    wrap.ontouchstart = e => { dragStartX = e.touches[0].clientX; dragDeltaX = 0; };
    wrap.ontouchmove = e => { dragDeltaX = e.touches[0].clientX - dragStartX; };
    wrap.ontouchend = () => { if (Math.abs(dragDeltaX) > 40) gMove(dragDeltaX < 0 ? 1 : -1); };

    document.onkeydown = e => {
      if (!appSection.classList.contains('detail-open')) return;
      if (e.key === 'ArrowRight') gMove(1);
      if (e.key === 'ArrowLeft') gMove(-1);
      if (e.key === 'Escape') closeDetail();
    };
  }
</script>
</body>
</html>
